name: CI

on:
  push:
    branches: [main, add-openai]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: backend
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: |
          set -euo pipefail
          python -m venv .venv
          PY=.venv/bin/python
          "$PY" -m pip install --upgrade pip setuptools wheel
          "$PY" -m pip install --retries 5 --timeout 120 \
            --extra-index-url https://download.pytorch.org/whl/cpu \
            -r requirements.txt
      - name: Pytest
        run: .venv/bin/python -m pytest tests/ -q --tb=short
      - name: Import app
        run: .venv/bin/python -c "from learning_analysis.main import app; assert app.title"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
