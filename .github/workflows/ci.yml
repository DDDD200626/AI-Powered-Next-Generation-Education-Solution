name: CI

on:
  push:
    branches: [main, add-openai]
  pull_request:
    branches: [main]

jobs:
  backend:
    # ubuntu-latest(24.04)에서 시스템 파이썬/PEP668 이슈를 피하고, 러너 업데이트 시에도 휠 호환을 맞추기 쉽게 22.04 고정
    runs-on: ubuntu-22.04
    env:
      TEAM_SEMANTIC_ENCODER: "0"
    defaults:
      run:
        shell: bash
        working-directory: backend
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: |
          set -euo pipefail
          python -m venv .venv
          PY=.venv/bin/python
          "$PY" -m pip install --upgrade pip setuptools wheel
          # torch 줄을 제외한 requirements 먼저(PyPI), 마지막에 torch만 PyTorch CPU 인덱스에서 설치(해석 충돌 방지)
          grep -v '^[[:space:]]*#' requirements.txt | grep -v '^[[:space:]]*$' | grep -vi '^[[:space:]]*torch' > /tmp/req-no-torch.txt
          "$PY" -m pip install --retries 5 --timeout 180 -r /tmp/req-no-torch.txt
          "$PY" -m pip install --retries 5 --timeout 180 \
            --extra-index-url https://download.pytorch.org/whl/cpu \
            "torch>=2.5.1"
      - name: Pytest
        run: .venv/bin/python -m pytest tests/ -q --tb=short
      - name: Import app
        run: .venv/bin/python -c "from learning_analysis.main import app; assert app.title"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
