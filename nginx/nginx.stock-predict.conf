# SPA + FastAPI 단일 진입(8080). prefix 는 반드시 이 파일이 있는 폴더(저장소/nginx).
#   tools\nginx-win\nginx-1.26.3\nginx.exe -p "C:\경로\stock-predict\nginx\" -c nginx.stock-predict.conf
# 또는:  powershell -File nginx\start-nginx.ps1
#
# 선행: (저장소 루트에서) cd frontend && npm run build
# 백엔드: 127.0.0.1:8000 uvicorn

worker_processes  1;

error_log  logs/error.log  notice;
pid        logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    # Windows: prefix/nginx 아래 temp 없으면 -t 실패
    client_body_temp_path temp/client_body 1 2;
    proxy_temp_path       temp/proxy 1 2;
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  75;
    types_hash_max_size 2048;
    client_max_body_size 32m;
    server_tokens off;

    upstream team_api_local {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    server {
        listen       8080;
        # LAN IP·localhost 등 어떤 Host 로 와도 이 블록이 기본 서버로 처리
        server_name  _;
        # prefix 가 nginx/ 이므로 상위의 빌드 산출물
        root         ../frontend/dist;
        index        index.html;
        error_page   502 503 504 /502.html;

        location /api/ {
            proxy_pass http://team_api_local/api/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            proxy_buffering off;
        }

        location /docs {
            proxy_pass http://team_api_local/docs;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /redoc {
            proxy_pass http://team_api_local/redoc;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /openapi.json {
            proxy_pass http://team_api_local/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
