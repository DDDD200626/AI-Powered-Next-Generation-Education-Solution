# 호스트 nginx (Docker 아님). scripts/nginx-host.ps1 가 경로 치환 후 사용.
# 연결: 사용자 -> Nginx(이 파일) -> 앱 서버(FastAPI @ 127.0.0.1:8000) -> (DB는 앱에서 연결)
# 정적 SPA: root = frontend/dist. /api·/docs 는 아래 proxy_pass.
worker_processes  1;
error_log  "C:/Users/LG/stock-predict/nginx/logs/error.log";
pid        "C:/Users/LG/stock-predict/nginx/logs/nginx.pid";

events {
    worker_connections  1024;
}

http {
    include       "C:/Users/LG/stock-predict/nginx/mime.types";
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    gzip  on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    server {
        listen       8090;
        server_name  localhost;
        root         "C:/Users/LG/stock-predict/frontend/dist";
        index        index.html;

        location /api/ {
            proxy_pass http://127.0.0.1:8000/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /docs {
            proxy_pass http://127.0.0.1:8000/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /redoc {
            proxy_pass http://127.0.0.1:8000/redoc;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /openapi.json {
            proxy_pass http://127.0.0.1:8000/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
