<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>백엔드 준비 중</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 36rem; margin: 3rem auto; padding: 0 1rem; line-height: 1.5; color: #e8e8e8; background: #12141a; }
    h1 { font-size: 1.25rem; }
    code { background: #1e222c; padding: 0.15rem 0.4rem; border-radius: 4px; }
    a { color: #7eb8ff; }
  </style>

<body>
  <h1>API 서버에 아직 연결되지 않았습니다</h1>
  <p>Docker 풀스택을 막 올린 경우 백엔드 컨테이너가 준비되는 데 몇 초 걸릴 수 있습니다. 잠시 후 새로고침하세요.</p>
  <p>개발 모드라면 브라우저에서 <code>http://127.0.0.1:5173</code> 을 열었는지 확인하세요. (<code>npm run dev</code>)</p>
  <p>프로덕션 nginx(8080)는 <code>docker compose up</code> 후 <code>http://127.0.0.1:8080</code> 입니다.</p>
</body>
</html>
