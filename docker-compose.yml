# 공모전·데모용: 웹 + API 한 번에 기동
# 사용: docker compose up --build
# 웹: http://127.0.0.1:8080  API 직접: http://127.0.0.1:8000
services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # xlarge_lite 전환 후 첫 기동에서 간격 무시하고 재학습. 한 번 성공하면 0으로 바꾸거나 줄을 지우는 것을 권장.
      TEAM_TORCH_MODEL_SIZE: xlarge_lite
      TEAM_RETRAIN_FORCE: "1"
    ports:
      - "8000:8000"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api
