<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}{{ app_title }} · 차세대 교육 AI{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <div>
        <p class="eyebrow">AI 활용 차세대 교육 솔루션</p>
        <h1 class="logo">{{ app_title }}</h1>
        <p class="tagline">교강사·수강생·운영자 페인 포인트를 잇는 보조 레이어 (LMS 구축과 무관)</p>
      </div>
      <div class="header-meta">
        {% if openai_configured %}
        <span class="pill pill-ok">OpenAI 서버 키 설정됨</span>
        {% else %}
        <span class="pill pill-warn">OPENAI_API_KEY 미설정 — 근거 검색·휴리스틱만 동작</span>
        {% endif %}
      </div>
    </div>
  </header>

  <nav class="tabs wrap" aria-label="기능 구역">
    <button type="button" class="tab active" data-tab="dash">통합 대시보드</button>
    <button type="button" class="tab" data-tab="comp">이해도 점검</button>
    <button type="button" class="tab" data-tab="integ">무결성 보조</button>
    <button type="button" class="tab" data-tab="learn">근거 기반 학습</button>
    <button type="button" class="tab" data-tab="teacher">피드백 초안</button>
    <button type="button" class="tab" data-tab="ops">운영 지표</button>
  </nav>

  <main class="wrap main">
    {% block body %}{% endblock %}
  </main>

  <footer class="site-footer wrap">
    <p>API 키는 서버 환경변수로만 주입하세요. 저장소·프론트에 넣지 마세요. 무결성 기능은 참고 신호이며 적발·징계를 대체하지 않습니다.</p>
  </footer>
  <script src="/static/app.js"></script>
</body>
</html>
